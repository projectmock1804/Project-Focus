name: Build & Release (Windows + Mac)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
      - name: Install web dependencies
        run: npm run web:install
      - name: Build web
        run: npm run web:build
      - name: Build Electron (Windows)
        run: npm run build:electron
      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist-electron/Project-Focus-Setup.exe

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
      - name: Install web dependencies
        run: npm run web:install
      - name: Build web
        run: npm run web:build
      - name: Build Electron (Mac)
        run: npm run build:electron:mac
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
      - name: Upload Mac artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-installer
          path: dist-electron/Project-Focus-*.dmg

  create-release:
    needs: [build-windows, build-mac]
    runs-on: ubuntu-latest
    if: success()
    steps:
      - uses: actions/checkout@v4
      - name: Download Windows
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: ./release
      - name: Download Mac
        uses: actions/download-artifact@v4
        with:
          name: mac-installer
          path: ./release
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: ./release/*
          draft: false
          prerelease: false
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          body: |
            ## 🚀 Project Focus Release v${{ github.run_number }}

            ### 📥 Download
            - 🪟 **Windows**: Project-Focus-Setup.exe
            - 🍎 **macOS**: Project-Focus-*.dmg

            ### 📦 Installation
            **Windows**: Double-click .exe to install
            **macOS**: Open .dmg and drag app to Applications folder

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
