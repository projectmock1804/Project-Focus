name: Build & Release (Windows + Mac)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
      - name: Install web dependencies
        run: npm run web:install
      - name: Build web
        run: npm run web:build
      - name: Build Electron (Windows)
        run: npm run build:electron
      - name: Upload Windows Release
        uses: softprops/action-gh-release@v1
        with:
          files: dist-electron/Project-Focus-Setup.exe
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          draft: false
          prerelease: false
          body: |
            ## 🚀 Project Focus Release v${{ github.run_number }}

            ### 📥 Downloads
            - 🪟 **Windows**: Project-Focus-Setup.exe
            - 🍎 **macOS**: Download from releases
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
      - name: Install web dependencies
        run: npm run web:install
      - name: Build web
        run: npm run web:build
      - name: Build Electron (Mac)
        run: npm run build:electron:mac
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
      - name: Find and upload Mac build
        run: |
          echo "Files in dist-electron:"
          ls -lah dist-electron/
          MAC_FILE=$(find dist-electron -name "*.zip" -type f | head -1)
          if [ -z "$MAC_FILE" ]; then
            echo "ERROR: No zip file found!"
            exit 1
          fi
          echo "Found Mac file: $MAC_FILE"
          echo "MAC_FILE=$MAC_FILE" >> $GITHUB_ENV
      - name: Upload Mac Release
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ env.MAC_FILE }}
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          draft: false
          prerelease: false
          append_body: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
