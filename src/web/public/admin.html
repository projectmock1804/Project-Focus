<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project Focus - Admin Panel</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0E0E0C;
      color: #F2F0EB;
      font-family: 'Inter', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      width: 100%;
      max-width: 400px;
      padding: 32px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
    }
    .icon {
      width: 48px;
      height: 48px;
      background: #E86B3A;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      margin-bottom: 24px;
    }
    h1 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    p {
      color: rgba(242,240,235,0.5);
      margin-bottom: 32px;
      font-size: 14px;
    }
    input {
      width: 100%;
      padding: 12px 16px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      color: #F2F0EB;
      font-size: 14px;
      margin-bottom: 12px;
      box-sizing: border-box;
      outline: none;
      transition: all 0.2s;
    }
    input:focus {
      border-color: rgba(232,107,58,0.5);
      background: rgba(232,107,58,0.05);
    }
    button {
      width: 100%;
      padding: 12px 16px;
      background: #E86B3A;
      color: #F2F0EB;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    button:hover {
      opacity: 0.9;
    }
    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .error {
      padding: 10px 12px;
      background: rgba(239,83,80,0.1);
      border: 1px solid rgba(239,83,80,0.3);
      border-radius: 6px;
      color: #ef5350;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }
    .info {
      margin-top: 24px;
      padding: 16px;
      background: rgba(102,126,234,0.1);
      border: 1px solid rgba(102,126,234,0.2);
      border-radius: 6px;
      font-size: 12px;
      color: rgba(242,240,235,0.6);
    }
    .info strong {
      display: block;
      margin-bottom: 8px;
    }
    .info ul {
      margin-left: 16px;
      margin-top: 8px;
    }
    .info li {
      margin-bottom: 4px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">⚙</div>
    <h1>Admin Panel</h1>
    <p>어드민 비밀번호를 입력하세요</p>

    <form onsubmit="handleLogin(event)">
      <div class="error" id="error"></div>

      <input
        type="password"
        id="secret"
        placeholder="Admin Secret"
        required
      >

      <button type="submit" id="btn">Admin 대시보드 접근</button>
    </form>

    <div class="info">
      <strong>Admin Features:</strong>
      <ul>
        <li>User management</li>
        <li>Subscription control</li>
        <li>Free tier management</li>
        <li>Statistics & analytics</li>
      </ul>
    </div>
  </div>

  <script>
    function handleLogin(event) {
      event.preventDefault();
      const secret = document.getElementById('secret').value;
      const errorDiv = document.getElementById('error');
      const btn = document.getElementById('btn');

      // 비밀번호 확인
      if (secret === 'focusmin0504') {
        // 로컬스토리지에 저장
        localStorage.setItem('adminSecret', secret);
        // 메인 앱으로 이동
        window.location.href = '/?admin=' + encodeURIComponent(secret);
      } else {
        errorDiv.textContent = '비밀번호가 틀렸습니다';
        errorDiv.style.display = 'block';
        document.getElementById('secret').value = '';
      }
    }

    // 이미 로그인된 경우 메인 앱으로 이동
    if (localStorage.getItem('adminSecret') === 'focusmin0504') {
      window.location.href = '/?admin=focusmin0504';
    }
  </script>
</body>
</html>
