<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="64" height="64" fill="#0E0E0C"/>

  <!-- Outer ring (focus indicator) -->
  <circle cx="32" cy="32" r="28" fill="none" stroke="#E86B3A" stroke-width="3"/>

  <!-- Middle ring -->
  <circle cx="32" cy="32" r="20" fill="none" stroke="#E86B3A" stroke-width="2" opacity="0.6"/>

  <!-- Inner circle (target center) -->
  <circle cx="32" cy="32" r="12" fill="#E86B3A"/>

  <!-- Center dot -->
  <circle cx="32" cy="32" r="6" fill="#F2F0EB"/>

  <!-- Focus rays (4 directions) -->
  <line x1="32" y1="2" x2="32" y2="8" stroke="#6B8E5A" stroke-width="2" stroke-linecap="round"/>
  <line x1="62" y1="32" x2="56" y2="32" stroke="#6B8E5A" stroke-width="2" stroke-linecap="round"/>
  <line x1="32" y1="62" x2="32" y2="56" stroke="#6B8E5A" stroke-width="2" stroke-linecap="round"/>
  <line x1="2" y1="32" x2="8" y2="32" stroke="#6B8E5A" stroke-width="2" stroke-linecap="round"/>
</svg>