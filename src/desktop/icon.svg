<svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="256" height="256" fill="#0E0E0C" rx="32"/>

  <!-- Outer ring (focus indicator) -->
  <circle cx="128" cy="128" r="112" fill="none" stroke="#E86B3A" stroke-width="12"/>

  <!-- Middle ring -->
  <circle cx="128" cy="128" r="80" fill="none" stroke="#E86B3A" stroke-width="8" opacity="0.6"/>

  <!-- Inner circle (target center) -->
  <circle cx="128" cy="128" r="48" fill="#E86B3A"/>

  <!-- Center dot -->
  <circle cx="128" cy="128" r="24" fill="#F2F0EB"/>

  <!-- Focus rays (4 directions) -->
  <line x1="128" y1="8" x2="128" y2="32" stroke="#6B8E5A" stroke-width="8" stroke-linecap="round"/>
  <line x1="248" y1="128" x2="224" y2="128" stroke="#6B8E5A" stroke-width="8" stroke-linecap="round"/>
  <line x1="128" y1="248" x2="128" y2="224" stroke="#6B8E5A" stroke-width="8" stroke-linecap="round"/>
  <line x1="8" y1="128" x2="32" y2="128" stroke="#6B8E5A" stroke-width="8" stroke-linecap="round"/>
</svg>