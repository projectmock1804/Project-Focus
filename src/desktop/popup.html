<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0E0E0C;
    color: #FAFAF8;
    font-family: 'Inter', system-ui, sans-serif;
    padding: 20px;
    min-height: 200px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    -webkit-app-region: drag;
    user-select: none;
    overflow: auto;
  }
  #videoContainer {
    display: none;
    margin-bottom: 16px;
  }
  #videoContainer.show {
    display: block;
  }
  video {
    width: 100%;
    max-height: 360px;
    border-radius: 8px;
    background: #000;
  }
  ::-webkit-scrollbar {
    display: none;
  }
  .top {
    display: flex;
    justify-content: flex-start;
    align-items: flex-start;
    margin-bottom: 12px;
  }
  .tag {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: #E86B3A;
    text-transform: uppercase;
  }
  .message {
    font-family: 'Fraunces', Georgia, serif;
    font-style: italic;
    font-size: 16px;
    font-weight: 300;
    line-height: 1.3;
    color: #FAFAF8;
    margin-bottom: 14px;
  }
  .actions {
    -webkit-app-region: no-drag;
    display: flex;
    flex-direction: row;
    gap: 10px;
    align-items: center;
  }
  .btn {
    padding: 10px 14px;
    border-radius: 8px;
    font-family: 'Inter', system-ui, sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    border: none;
    transition: opacity 0.15s;
  }
  .btn:hover {
    opacity: 0.85;
  }
  .btn-primary {
    background: #E86B3A;
    color: #FAFAF8;
    flex: 1;
  }
  .btn-secondary {
    background: rgba(250,250,248,0.1);
    color: rgba(250,250,248,0.7);
    flex: 1;
  }
  select {
    -webkit-app-region: no-drag;
    padding: 10px 12px;
    border-radius: 8px;
    background: rgba(250,250,248,0.1);
    color: rgba(250,250,248,0.7);
    border: 1px solid rgba(250,250,248,0.2);
    font-family: 'Inter', system-ui, sans-serif;
    font-size: 13px;
    cursor: pointer;
    flex: 1;
    transition: all 0.2s;
  }
  select:hover {
    border-color: rgba(250,250,248,0.4);
  }
  select:focus {
    outline: none;
    border-color: #E86B3A;
    background: rgba(232, 107, 58, 0.1);
    color: rgba(250,250,248,0.9);
  }
  option {
    background: #0E0E0C;
    color: #FAFAF8;
  }
</style>
</head>
<body>
<div id="videoContainer" class="">
  <video id="focusVideo" autoplay muted playsinline controls controlsList="nodownload" style="width: 100%; display: block;">
    <source src="http://127.0.0.1:3002/video.mp4" type="video/mp4">
    Your browser does not support the video tag.
  </video>
</div>

<div class="top">
  <span class="tag">Focus Alert</span>
</div>
<div class="message" id="message"></div>
<div class="actions">
  <button class="btn btn-primary" onclick="backToWork()" style="flex: 0.6;">Back to work</button>
  <select id="snoozeSelect" onchange="handleSnoozeChange()" style="flex: 0.65;">
    <option value="">Snooze...</option>
    <option value="1">1m</option>
    <option value="5">5m</option>
    <option value="10">10m</option>
  </select>
</div>

<script>
// Set message from query parameter
const params = new URLSearchParams(window.location.search);
const site = params.get('site') || 'This site';
const mins = params.get('mins') || 0;
const videoPath = params.get('video');
const isYouTube = params.get('isYouTube') === 'true';

// Show video if available or YouTube
if (videoPath || isYouTube) {
  document.getElementById('videoContainer').classList.add('show');
  const msgEl = document.getElementById('message');
  msgEl.textContent = '';
  const line1 = document.createTextNode('Focus Moment: Watch this before continuing.');
  const br1 = document.createElement('br');
  const br2 = document.createElement('br');
  const strong = document.createElement('strong');
  strong.textContent = site;
  const line2 = document.createTextNode(` — ${Number(mins)} min spent here.`);
  msgEl.append(line1, br1, br2, strong, line2);

  // Set video source
  const video = document.getElementById('focusVideo');
  const source = video.querySelector('source');

  if (videoPath) {
    // Convert file path to file:// URL
    const fileUrl = 'file:///' + videoPath.replace(/\\/g, '/');
    source.src = fileUrl;
    source.type = 'video/mp4';
    console.log('[POPUP] Video source set to:', fileUrl);
  }

  // Reload video element to apply source change
  video.load();

  // When video is loaded, try to play
  video.addEventListener('canplay', () => {
    console.log('[POPUP] Video can play');
    video.play().catch(err => {
      console.error('[POPUP] Play error:', err);
      video.muted = true;
      video.play().catch(err2 => console.error('[POPUP] Muted play error:', err2));
    });
  });

  // When video is ready
  video.addEventListener('loadstart', () => {
    console.log('[POPUP] Video loading started');
  });

  // Try to play after a short delay
  setTimeout(() => {
    console.log('[POPUP] Forcing play (muted)');
    video.muted = true;
    video.play().catch(err => {
      console.error('[POPUP] Forced play error:', err);
    });
  }, 300);

  // Try unmuted play after another delay
  setTimeout(() => {
    console.log('[POPUP] Trying unmuted play');
    video.muted = false;
    video.play().catch(err => console.error('[POPUP] Unmuted play error:', err));
  }, 1000);
} else {
  const msgEl2 = document.getElementById('message');
  msgEl2.textContent = '';
  const siteName = document.createTextNode(`${site} doesn't care about your deadline.`);
  const brTag = document.createElement('br');
  const minsText = document.createTextNode(`${Number(mins)} min spent here.`);
  msgEl2.append(siteName, brTag, minsText);
}

async function backToWork() {
  console.log('[POPUP] Back to work clicked');
  try {
    const res = await fetch('http://127.0.0.1:3001/action', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'backToWork' }),
    });
    console.log('[POPUP] Response:', res.status);
  } catch (err) {
    console.error('[POPUP] Error:', err);
  }
}

async function handleSnoozeChange() {
  const select = document.getElementById('snoozeSelect');
  const minutes = select.value;

  if (!minutes) return;

  console.log('[POPUP] Snooze clicked:', minutes + 'm');
  try {
    const res = await fetch('http://127.0.0.1:3001/action', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'snooze', minutes: parseInt(minutes) }),
    });
    console.log('[POPUP] Response:', res.status);
    select.value = ''; // Reset select
  } catch (err) {
    console.error('[POPUP] Error:', err);
  }
}
</script>
</body>
</html>
